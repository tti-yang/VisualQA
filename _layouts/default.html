<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    // When shown inside the cascade overlay (an iframe), hide the site chrome
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
  </script>
</head>
<body>
  {% unless page.url == '/' %}
  <div class="site-topbar">
    <a class="site-topbar-brand" href="{{ '/' | relative_url }}">← NeuroQA</a>
  </div>
  <script>
    // Return the "← NeuroQA" link to wherever the cascade was left off
    (function () {
      var el = document.querySelector('.site-topbar-brand');
      if (!el) return;
      try {
        var p = sessionStorage.getItem('vqa-path');
        if (p) el.href = el.getAttribute('href').split('?')[0] + '?path=' + encodeURIComponent(p);
      } catch (e) {}
    })();
  </script>
  {% endunless %}
  {{ content }}
</body>
</html>
