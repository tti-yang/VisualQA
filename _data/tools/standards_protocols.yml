# Standards & Protocols

- name: ENIGMA Protocols
  description: Standardized imaging protocols for cortical, subcortical, DTI, and VBM analysis used across ENIGMA working groups.
  url: https://enigma.ini.usc.edu/protocols/imaging-protocols
  date_added: 2026-06-16

- name: protocols.io
  description: Platform for sharing and discovering versioned, citable step-by-step research protocols.
  url: https://www.protocols.io
  date_added: 2026-06-16

- name: BIDS specification
  description: Community standard for organizing and describing neuroimaging datasets in a consistent file and metadata structure.
  url: https://github.com/bids-standard/bids-specification
  github: bids-standard/bids-specification
  language: Web
  date_added: 2026-06-19
  modality: MRI
  submodality: multi
- name: BIDS Validator
  description: Checks datasets for compliance with the BIDS standard, flagging missing files and metadata errors.
  url: https://github.com/bids-standard/bids-validator
  github: bids-standard/bids-validator
  language: JavaScript
  date_added: 2026-06-19
  modality: MRI
  submodality: multi
- name: ENIGMA FreeSurfer Protocol
  description: Standardized scripts for cortical thickness, surface area, and subcortical volume extraction and QC from FreeSurfer outputs across ENIGMA working groups.
  url: https://github.com/ENIGMA-git/ENIGMA-FreeSurfer-protocol
  github: ENIGMA-git/ENIGMA-FreeSurfer-protocol
  language: MATLAB
  date_added: 2026-06-19
  modality: MRI
  submodality: structural
- name: ENIGMA DTI-TBSS Protocol
  description: Standardized pipeline for registering FA images to the ENIGMA-DTI template and performing tract-based spatial statistics with ROI extraction.
  url: https://github.com/ENIGMA-git/ENIGMA-DTI-TBSS-Protocol
  github: ENIGMA-git/ENIGMA-DTI-TBSS-Protocol
  language: MATLAB
  date_added: 2026-06-19
  modality: MRI
  submodality: diffusion
- name: ENIGMA DTI Preprocessing Guidelines
  description: Standardized preprocessing scripts for diffusion MRI eddy current correction and EPI distortion correction across ENIGMA-DTI sites.
  url: https://github.com/ENIGMA-git/ENIGMA-DTI-Preprocessing-Guidelines
  github: ENIGMA-git/ENIGMA-DTI-Preprocessing-Guidelines
  language: Shell
  date_added: 2026-06-19
  modality: MRI
  submodality: diffusion
- name: ENIGMA-CNV Protocol
  description: Protocols and scripts for the ENIGMA copy number variant working group, covering neuroimaging QC and analysis steps for CNV carriers.
  url: https://github.com/ENIGMA-git/ENIGMA-CNV
  github: ENIGMA-git/ENIGMA-CNV
  language: Shell
  date_added: 2026-06-19
  modality: MRI
  submodality: multi