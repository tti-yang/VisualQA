# Consortia

- name: ENIGMA
  description: Global consortium for large-scale neuroimaging genetics meta-analyses spanning 80+ working groups and countries.
  url: https://enigma.ini.usc.edu
  date_added: 2026-06-16

- name: ReproNim
  description: NIH center for reproducible neuroimaging computation — training, tools, and standards.
  url: https://www.repronim.org
  date_added: 2026-06-16

- name: INCF
  description: International Neuroinformatics Coordinating Facility — standards, training, and infrastructure for neuroscience.
  url: https://www.incf.org
  date_added: 2026-06-16

- name: CONP
  description: Canadian Open Neuroscience Platform — data sharing and open science infrastructure for neuroimaging research.
  url: https://conp.ca
  date_added: 2026-06-16

- name: OHBM Open Science SIG
  description: OHBM special interest group advancing open sharing of ideas, data, and tools in neuroimaging.
  url: https://ossig.netlify.app
  date_added: 2026-06-16
