# Preprocessing tools
# Fields:
#   name:        display name
#   description: one sentence — what it does, not why it matters
#   url:         homepage or repo
#   github:      owner/repo  (required for health checks)
#   language:    primary implementation language
#   modality:    top-level modality — MRI or EEG
#   submodality: optional refinement within a modality (e.g. fMRI, structural, diffusion, ASL, multi)

- name: fMRIPrep
  description: Robust preprocessing pipeline for task-based and resting-state fMRI with automated decision-making and visual QC reports.
  url: https://github.com/nipreps/fmriprep
  github: nipreps/fmriprep
  language: Python
  date_added: 2026-06-16
  modality: MRI
  submodality: fMRI
- name: dMRIPrep
  description: Preprocessing pipeline for diffusion MRI following the fMRIPrep design framework.
  url: https://github.com/nipreps/dmriprep
  github: nipreps/dmriprep
  language: Python
  date_added: 2026-06-16
  modality: MRI
  submodality: diffusion
