# Datasets

- name: OpenNeuro
  description: Free and open platform for sharing and analyzing BIDS-formatted neuroimaging datasets.
  url: https://openneuro.org
  github: OpenNeuroOrg/openneuro
  date_added: 2026-06-16

- name: NeuroVault
  description: Repository for sharing unthresholded statistical brain maps from published studies.
  url: https://neurovault.org
  date_added: 2026-06-16

- name: Human Connectome Project
  description: High-resolution structural, functional, and diffusion MRI from 1,200 healthy adults.
  url: https://www.humanconnectome.org
  date_added: 2026-06-16

- name: ADNI
  description: Longitudinal MRI data from participants across the Alzheimer's disease spectrum.
  url: https://adni.loni.usc.edu
  date_added: 2026-06-16

- name: OASIS
  description: Cross-sectional and longitudinal structural brain MRI datasets for aging and dementia research.
  url: https://www.oasis-brains.org
  date_added: 2026-06-16

- name: IXI
  description: Around 600 structural MRI scans from healthy subjects collected at three London hospitals.
  url: https://brain-development.org/ixi-dataset
  date_added: 2026-06-16

- name: ABCD
  description: Longitudinal brain imaging study tracking 10,000+ adolescents across the US.
  url: https://abcdstudy.org
  date_added: 2026-06-16

- name: UK Biobank
  description: Population-level brain imaging from 100,000+ UK participants; access requires application.
  url: https://www.ukbiobank.ac.uk
  date_added: 2026-06-16

- name: HBCD
  description: Longitudinal study of early brain and cognitive development tracking children from birth to age ten with structural and functional MRI.
  url: https://hbcdstudy.org
  date_added: 2026-06-16

- name: NeuroStore
  description: Centralized database of 30,000+ neuroimaging studies with pre-extracted activation coordinates, powering Neurosynth Compose.
  url: https://neurostore.org
  date_added: 2026-06-17

- name: BrainMap
  description: Curated database of neuroimaging coordinates and metadata from peer-reviewed studies; powers GingerALE meta-analyses.
  url: https://www.brainmap.org
  date_added: 2026-06-17

- name: ATLAS
  description: Open stroke dataset of T1-weighted MRI scans with manually segmented lesion masks; version 3 includes 1,453 subjects.
  url: https://fcon_1000.projects.nitrc.org/indi/retro/atlas.html
  modality: MRI
  submodality: structural
  date_added: 2026-06-18
  added_by: youwanM
  added_by_github: youwanM

- name: HBN
  description: Open pediatric dataset from the Child Mind Institute with structural and functional MRI alongside behavioral measures.
  url: https://fcon_1000.projects.nitrc.org/indi/cmi_healthy_brain_network/
  modality: MRI
  submodality: multi
  date_added: 2026-06-18

- name: NeuroBagel
  description: Ecosystem for distributed neuroimaging dataset harmonization and search.
  url: https://neurobagel.org
  github: neurobagel/bagel-cli
  date_added: 2026-06-16
