<!-- ────────────────────────────────────────────────────────────────────────
     The whole navigation is generated from the data below — edit it and the
     cascading pills, levels, and leaf panel update, no other code to touch.

     Three parts:
       "modalities" — the modality → sub-modality tree (the part that varies).
       "sections"   — the SHARED shell applied under EVERY sub-modality:
                      Equipment setup / Artifacts / QC checks / Practice.
       "content"    — per-modality items that fill a section, e.g. the MRI
                      artifact pages under MRI › (any sub-modality) › Artifacts.
                      Keyed by modality so MRI items don't appear under EEG.

     An item with a "url" is a LINK to a real page (opens it). A node with
     children drills down; an empty section shows a placeholder panel.
     STARTING POINT: sub-modalities are placeholders, and artifacts are not
     yet split by sub-modality (the MRI list shows under each). The group
     refines the taxonomy and adds items to "content".
     ──────────────────────────────────────────────────────────────────────── -->
<script id="taxonomy" type="application/json">
{
  "modalities": {
    "MRI": {
      "children": {
        "Functional (fMRI)": {},
        "Structural":        {},
        "Diffusion (dMRI)":  {}
      }
    },
    "EEG": {
      "children": {
        "A": {},
        "B": {},
        "C": {}
      }
    }
  },
  "sections": {
    "Equipment setup": {},
    "Artifacts":       {},
    "QC checks":       {},
    "Practice":        {}
  },
  "content": {
    "MRI": {
      "Artifacts": {
        "Head motion":    { "url": "/artifacts/mri/head-motion/" },
        "Eye spillover":  { "url": "/artifacts/mri/eye-spill/" },
        "Aliasing ghost": { "url": "/artifacts/mri/aliasing-ghost/" },
        "Wrap-around":    { "url": "/artifacts/mri/wraparound/" }
      },
      "Practice": {
        "Rate this scan (quiz)": { "url": "/quizzes/mri/quiz1/" }
      }
    }
  }
}
</script>

<div class="river" id="river"></div>

<div class="leaf-panel" id="leaf-panel" hidden>
  <p class="leaf-path" id="leaf-path"></p>
  <p class="leaf-note">Artifact content will live here — annotated examples, how to spot it, severity, and the judgment call. (Placeholder.)</p>
</div>

<style>
  .river {
    margin: 64px auto 0;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .river-level {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 0;
    position: relative;
  }
  /* the "flow" — a short centered hairline connecting each level to the next */
  .river-level + .river-level::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    width: 1px;
    height: 16px;
    background: var(--hairline);
  }
  .level-label {
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
  }
  /* Top level (modality: MRI / EEG) — larger than the deeper pills */
  .river-level:first-child .pill {
    font-size: 16px;
    padding: 8px 22px;
    border-radius: 3px;
  }
  .level-pills {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
  }
  .leaf-panel {
    margin: 28px auto 0;
    max-width: 560px;
    padding: 22px 24px;
    border: 1px solid var(--hairline);
    border-radius: 2px;
    text-align: center;
  }
  .leaf-path { font-size: 14px; color: var(--text); margin: 0 0 10px; }
  .leaf-note { font-size: 13px; color: var(--muted); margin: 0; line-height: 1.6; }
</style>

<script>
  const DATA       = JSON.parse(document.getElementById('taxonomy').textContent);
  const MODALITIES = DATA.modalities;   // varies per branch
  const SECTIONS   = DATA.sections;     // shared shell under every sub-modality
  const CONTENT    = DATA.content || {}; // per-modality items that fill sections
  const BASEURL    = "/VisualQA"; // e.g. /VisualQA — for page links
  const riverEl  = document.getElementById('river');
  const panelEl  = document.getElementById('leaf-panel');
  const pathEl   = document.getElementById('leaf-path');

  // The path is the selections made so far, top to bottom:
  // e.g. ['MRI', 'Functional (fMRI)', 'Artifacts', 'A']
  let path = [];

  const LEVEL_LABELS = ['Modality', 'Sub-modality', 'Section', ''];

  // The node at a given path:
  //   level 0 → modalities   1 → sub-modalities   2 → shared section shell
  //   3 → per-modality items in that section   4 → a single item (may have .url)
  function nodeAt(keys) {
    if (keys.length === 0) return { children: MODALITIES };
    const [mod, sub, section, item] = keys;
    if (!MODALITIES[mod]) return null;
    if (keys.length === 1) return MODALITIES[mod];                       // → sub-modalities
    if (!MODALITIES[mod].children || !MODALITIES[mod].children[sub]) return null;
    if (keys.length === 2) return { children: SECTIONS };                // shared shell
    if (!SECTIONS[section]) return null;
    const items = (CONTENT[mod] && CONTENT[mod][section]) || {};
    if (keys.length === 3) return { children: items };                   // per-modality items
    if (!items[item]) return null;
    return items[item];                                                  // terminal item
  }

  function childrenAt(keys) {
    const n = nodeAt(keys);
    return n ? (n.children || {}) : null;
  }

  function render() {
    riverEl.innerHTML = '';

    // Render one pill row per level along the current path, plus the next
    // unselected level. Level i offers the children available given path[0..i-1].
    for (let i = 0; i <= path.length; i++) {
      const options = childrenAt(path.slice(0, i));
      if (!options || Object.keys(options).length === 0) break;

      const level = document.createElement('div');
      level.className = 'river-level';

      const labelText = LEVEL_LABELS[i] || '';
      if (labelText) {
        const label = document.createElement('span');
        label.className = 'level-label';
        label.textContent = labelText;
        level.appendChild(label);
      }

      const pills = document.createElement('div');
      pills.className = 'level-pills';
      for (const key of Object.keys(options)) {
        const node = nodeAt(path.slice(0, i).concat(key));
        const isLink = node && node.url && Object.keys(node.children || {}).length === 0;
        let pill;
        if (isLink) {
          // Terminal item with a page — a real link that opens it
          pill = document.createElement('a');
          pill.className = 'pill pill-link';
          pill.href = BASEURL + node.url;
          pill.textContent = key;
        } else {
          pill = document.createElement('button');
          pill.className = 'pill' + (path[i] === key ? ' selected' : '');
          pill.textContent = key;
          pill.addEventListener('click', () => choose(i, key));
        }
        pills.appendChild(pill);
      }
      level.appendChild(pills);
      riverEl.appendChild(level);
    }

    updatePanel();
    updateURL();
  }

  function choose(level, key) {
    if (path[level] === key) {
      // Toggle off — clicking the selected pill collapses everything below it
      path = path.slice(0, level);
    } else {
      path = path.slice(0, level);
      path.push(key);
    }
    render();
  }

  // Show the leaf panel only when the current selection has no further children
  function updatePanel() {
    const opts = childrenAt(path);
    const isLeaf = path.length > 0 && (!opts || Object.keys(opts).length === 0);
    if (isLeaf) {
      pathEl.textContent = path.join('  ›  ');
      panelEl.hidden = false;
    } else {
      panelEl.hidden = true;
    }
  }

  function updateURL() {
    const q = path.length ? '?path=' + encodeURIComponent(path.join('/')) : location.pathname;
    history.replaceState(null, '', q);
  }

  // Restore a shared path from the URL
  (function () {
    const p = new URLSearchParams(location.search).get('path');
    if (p) {
      const parts = p.split('/');
      const restored = [];
      for (let i = 0; i < parts.length; i++) {
        const opts = childrenAt(restored);
        if (opts && opts[parts[i]]) restored.push(parts[i]); else break;
      }
      path = restored;
    }
    render();
  })();
</script>
